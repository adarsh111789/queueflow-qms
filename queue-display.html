<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Queue Display - Queue Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-900 text-white overflow-hidden">
    <div class="min-h-screen flex flex-col justify-center items-center p-8">
        <!-- Announcement Banner -->
        <div class="w-full max-w-6xl mb-8 bg-gradient-to-r from-indigo-600 to-blue-600 rounded-2xl p-6 text-center">
            <h1 class="text-3xl font-bold">Welcome to Our Service Center</h1>
            <p class="text-lg text-indigo-100 mt-2">Please ensure you have your token number before approaching the counter</p>
        </div>

        <div class="w-full max-w-6xl">
            <!-- Main Display -->
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8 mb-8">
                <!-- Large Token Display -->
                <div class="lg:col-span-2 bg-gradient-to-br from-slate-800 to-slate-900 rounded-2xl p-8 border-2 border-indigo-600 shadow-2xl">
                    <p class="text-sm text-slate-400 mb-2">Now Serving</p>
                    <div class="text-8xl font-bold text-indigo-400 mb-6 text-center leading-none" id="main-token">
                        --
                    </div>
                    <p class="text-center text-lg text-slate-300">Counter <span id="main-counter">1</span></p>
                </div>

                <!-- Digital Clock & Info -->
                <div class="lg:col-span-2 space-y-6">
                    <div class="bg-slate-800 rounded-2xl p-8 border border-slate-700 text-center">
                        <p class="text-sm text-slate-400 mb-2">Current Time</p>
                        <div class="text-5xl font-bold text-white mb-4" id="digital-clock">00:00</div>
                        <p class="text-slate-300" id="current-date">--</p>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-800 rounded-xl p-4 border border-slate-700 text-center">
                            <p class="text-xs text-slate-400 mb-2">Queue Status</p>
                            <p class="text-3xl font-bold text-green-400" id="queue-count">0</p>
                            <p class="text-xs text-slate-400 mt-2">Waiting</p>
                        </div>
                        <div class="bg-slate-800 rounded-xl p-4 border border-slate-700 text-center">
                            <p class="text-xs text-slate-400 mb-2">Avg Wait</p>
                            <p class="text-3xl font-bold text-blue-400" id="avg-wait">0 min</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Upcoming Tokens -->
            <div class="bg-slate-800 rounded-2xl p-8 border border-slate-700">
                <h2 class="text-2xl font-bold mb-6">Upcoming Tokens</h2>
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4" id="upcoming-tokens">
                    <div class="animate-pulse">
                        <div class="h-16 bg-slate-700 rounded-lg"></div>
                    </div>
                    <div class="animate-pulse">
                        <div class="h-16 bg-slate-700 rounded-lg"></div>
                    </div>
                    <div class="animate-pulse">
                        <div class="h-16 bg-slate-700 rounded-lg"></div>
                    </div>
                    <div class="animate-pulse">
                        <div class="h-16 bg-slate-700 rounded-lg"></div>
                    </div>
                    <div class="animate-pulse">
                        <div class="h-16 bg-slate-700 rounded-lg"></div>
                    </div>
                    <div class="animate-pulse">
                        <div class="h-16 bg-slate-700 rounded-lg"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/core.js"></script>
    <script src="js/queue-display.js"></script>
</body>
</html>
